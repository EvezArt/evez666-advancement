# Kafka Topics for Economic Graph
# Apply with: kubectl apply -f kafka-topics.yaml

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: graph.intake
  labels:
    strimzi.io/cluster: kiloclaw-cluster
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: 86400000
    segment.bytes: 1048576
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: graph.router
  labels:
    strimzi.io/cluster: kiloclaw-cluster
spec:
  partitions: 12
  replicas: 3
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: graph.sales
  labels:
    strimzi.io/cluster: kiloclaw-cluster
spec:
  partitions: 16
  replicas: 3
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: graph.marketing
  labels:
    strimzi.io/cluster: kiloclaw-cluster
spec:
  partitions: 8
  replicas: 3
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: graph.negotiator
  labels:
    strimzi.io/cluster: kiloclaw-cluster
spec:
  partitions: 8
  replicas: 3
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: graph.converter
  labels:
    strimzi.io/cluster: kiloclaw-cluster
spec:
  partitions: 8
  replicas: 3
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: graph.ledger
  labels:
    strimzi.io/cluster: kiloclaw-cluster
spec:
  partitions: 4
  replicas: 3
  config:
    retention.ms: 31536000000
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: graph.learning
  labels:
    strimzi.io/cluster: kiloclaw-cluster
spec:
  partitions: 2
  replicas: 3