<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EVEZ Governance Lattice v0.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { background:#02040a; color:#f5f5f5; font-family:system-ui,sans-serif; margin:0; padding:1rem; }
    h1 { font-size:1.1rem; margin:0 0 .5rem; }
    textarea, input { width:100%; box-sizing:border-box; background:#050815; color:#f5f5f5;
      border:1px solid #2a2f4a; border-radius:4px; padding:.5rem; font-family:monospace; }
    button { margin-top:.5rem; padding:.5rem .75rem; border-radius:4px; border:none;
      background:#4b7bff; color:#fff; font-weight:600; width:100%; }
    pre { background:#050815; border-radius:4px; padding:.5rem; overflow-x:auto; font-size:.75rem; }
    .row { margin-top:1rem; }
    .badge { display:inline-block; padding:.15rem .35rem; border-radius:999px; font-size:.65rem;
      background:#111827; border:1px solid #374151; margin-right:.25rem; }
  </style>
</head>
<body>
  <h1>EVEZ Governance Lattice v0.3 – Browser Proof Surface</h1>
  <div class="row">
    <span class="badge">Origami Fold</span>
    <span class="badge">Permission Lattice</span>
    <span class="badge">Third-Order Correction</span>
    <span class="badge">Webhook Ready</span>
  </div>
  <div class="row">
    <label>Operator Intent</label>
    <textarea id="intent" rows="4" placeholder="Launch Slack governance pilot for multi-agent workflows"></textarea>
  </div>
  <div class="row">
    <label>Webhook URL (optional)</label>
    <input id="webhook" placeholder="https://your-domain/api/first-harvest or n8n webhook" />
  </div>
  <div class="row">
    <button id="runFold">Run Fold</button>
    <button id="postFold">Run Fold + POST to Webhook</button>
  </div>
  <div class="row">
    <label>Status</label>
    <pre id="status"></pre>
  </div>
  <div class="row">
    <label>Proof Surface</label>
    <pre id="proof"></pre>
  </div>
  <script>
    const PERMISSION_LATTICE = {
      crown: { readTruth: 'HARD', writeTruth: 'HARD', execute: 'HARD', validate: 'HARD', bypassRisk: 'FORBIDDEN' },
      board: { readTruth: 'SOFT', writeTruth: 'SOFT', execute: 'SOFT', validate: 'SOFT', bypassRisk: 'FORBIDDEN' }
    };
    function hashString(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
      return `h_${Math.abs(h)}`;
    }
    function rotationBattery(intent) {
      const normalized = intent.trim().toLowerCase();
      const tokens = normalized.split(/\s+/).filter(Boolean);
      const lengthScore = tokens.length >= 4 ? 1 : 0.6;
      const explicitGoalScore = /(launch|build|deploy|test|run|ship|prove|audit)/.test(normalized) ? 1 : 0.7;
      const ambiguityScore = /(something|stuff|thing|whatever)/.test(normalized) ? 0.45 : 0.95;
      const safetyScore = /(bypass|override|ignore|disable)/.test(normalized) ? 0.25 : 0.95;
      const consistency = Number(((lengthScore + explicitGoalScore + ambiguityScore + safetyScore) / 4).toFixed(3));
      return {
        timeShift: Number((0.85 * consistency).toFixed(3)),
        stateShift: Number((0.90 * consistency).toFixed(3)),
        frameShift: Number((0.92 * consistency).toFixed(3)),
        adversarialShift: Number((0.88 * consistency).toFixed(3)),
        identityGoalShift: Number((0.95 * consistency).toFixed(3)),
        consistency
      };
    }
    function detectDrift(intent, battery) {
      const driftDetected = battery.consistency < 0.78 || /bypass|override|ignore|disable/.test(intent.toLowerCase());
      return { driftDetected, reason: driftDetected ? 'Intent failed consistency or attempted bypass semantics.' : 'No major drift detected.' };
    }
    function buildTrace(intent) {
      const now = new Date().toISOString();
      const stages = ['Operator Intent', 'Controller Run', 'Risk Gate', 'Dispatch / Chain', 'Receipt / Rejection', 'Authoritative State', 'Proof Surface'];
      return stages.map((stage, index) => ({ stage, index, timestamp: now, intentSnapshot: intent }));
    }
    function runFold(intent) {
      const now = new Date().toISOString();
      const battery = rotationBattery(intent);
      const drift = detectDrift(intent, battery);
      const ok = PERMISSION_LATTICE.crown.bypassRisk === 'FORBIDDEN' && !drift.driftDetected;
      const result = {
        ok,
        intent,
        timestamp: now,
        eventId: `evt_${Date.now()}`,
        lineageHash: hashString(intent + now),
        permissionLattice: PERMISSION_LATTICE,
        invarianceBattery: battery,
        thirdOrder: { enabled: true, ...drift },
        trace: buildTrace(intent)
      };
      try { localStorage.setItem('evez_last_fold', JSON.stringify(result)); } catch {}
      return result;
    }
    function showStatus(msg) { document.getElementById('status').textContent = msg; }
    async function postFold() {
      const intent = document.getElementById('intent').value.trim();
      const webhook = document.getElementById('webhook').value.trim();
      if (!intent) { showStatus('Provide an Operator Intent first.'); return; }
      const result = runFold(intent);
      document.getElementById('proof').textContent = JSON.stringify(result, null, 2);
      if (!webhook) { showStatus('Fold ran locally. No webhook configured.'); return; }
      try {
        const resp = await fetch(webhook, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(result) });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        showStatus(`Fold posted successfully to ${webhook}`);
      } catch (err) { showStatus(`Webhook post failed: ${err.message}`); }
    }
    document.getElementById('runFold').onclick = () => {
      const intent = document.getElementById('intent').value.trim();
      if (!intent) { showStatus('Provide an Operator Intent first.'); return; }
      const result = runFold(intent);
      document.getElementById('proof').textContent = JSON.stringify(result, null, 2);
      showStatus('Fold completed locally.');
    };
    document.getElementById('postFold').onclick = postFold;
  </script>
</body>
</html>
