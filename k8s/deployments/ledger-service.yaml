apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
  namespace: kiloclaw-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
    spec:
      containers:
      - name: ledger
        image: kiloclaw/ledger-service:latest
        env:
        - name: DATABASE_URL
          value: "postgresql://kiloclaw:password@postgres.kiloclaw:5432/ledger"
        - name: KAFKA_BROKERS
          value: "kafka.kiloclaw:9092"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-service
  namespace: kiloclaw-services
spec:
  selector:
    app: ledger-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ledger-pvc
  namespace: kiloclaw-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi