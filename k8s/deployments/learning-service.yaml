apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-service
  namespace: kiloclaw-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: learning-service
  template:
    metadata:
      labels:
        app: learning-service
    spec:
      containers:
      - name: learning
        image: kiloclaw/learning-service:latest
        env:
        - name: LEDGER_URL
          value: "http://ledger-service.kiloclaw:8080"
        - name: KAFKA_BROKERS
          value: "kafka.kiloclaw:9092"
        - name: MUTATION_INTERVAL_SECONDS
          value: "300"
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: learning-service
  namespace: kiloclaw-services
spec:
  selector:
    app: learning-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP