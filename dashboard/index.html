<!DOCTYPE html>
<html>
<head>
    <title>EVEZ Live Dashboard</title>
    <meta http-equiv="refresh" content="10">
    <style>
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; padding: 20px; margin: 0; }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        h2 { color: #8b949e; font-size: 14px; text-transform: uppercase; margin-top: 30px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 15px; }
        .stat { font-size: 32px; color: #3fb950; font-weight: bold; }
        .label { color: #8b949e; font-size: 11px; text-transform: uppercase; }
        .cheat { background: #1f2428; padding: 12px; margin: 8px 0; border-left: 3px solid #f78166; font-size: 13px; }
        .progress-bar { background: #21262d; height: 24px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { background: linear-gradient(90deg, #3fb950, #2ea043); height: 100%; transition: width 0.5s; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #30363d; font-size: 13px; }
        th { color: #8b949e; text-transform: uppercase; font-size: 11px; }
        .running { color: #3fb950; }
        .stopped { color: #f85149; }
        .time { color: #8b949e; font-size: 11px; }
        .timestamp { color: #8b949e; font-size: 11px; position: fixed; top: 10px; right: 20px; }
    </style>
</head>
<body>
    <div class="timestamp">Last updated: <span id="timestamp"></span></div>
    <h1>🦾 EVEZ LIVE DASHBOARD</h1>
    
    <div class="grid">
        <div class="card"><div class="stat" id="agent-count">0</div><div class="label">Agents Running</div></div>
        <div class="card"><div class="stat" id="quantum-count">0</div><div class="label">Quantum Circuits</div></div>
        <div class="card"><div class="stat" id="cycle-count">0</div><div class="label">Cycles Completed</div></div>
        <div class="card"><div class="stat" id="github-count">0</div><div class="label">Git Changes</div></div>
    </div>
    
    <h2>🤖 Agent Status</h2>
    <table><thead><tr><th>Agent</th><th>Status</th><th>Last Action</th></tr></thead><tbody id="agent-table"></tbody></table>
    
    <h2>⚡ Quantum Execution</h2>
    <div class="progress-bar"><div class="progress-fill" id="quantum-bar" style="width:0%"></div></div>
    <div class="label" id="quantum-label">loading...</div>
    
    <h2>🔑 YOUR CHEATCODES & NOTES (18 found)</h2>
    <div id="cheatcodes"></div>
    
    <h2>📜 Recent Activity</h2>
    <div id="activity-log"></div>

    <script>
        const cheatcodes = [
            {f: '/Evez666/HONEST_INVENTORY_REPORT.md', n: 'Real state - BULLSHIT check'},
            {f: '/Evez666/QUICKSTART.md', n: 'Quick start guide'},
            {f: '/Evez666/PHONE_ONLY.md', n: 'Mobile access'},
            {f: '/Evez666/docs/initial-access.md', n: 'Setup instructions'},
            {f: '/Evez666/docs/kofi-setup.md', n: 'Payment/Kofi setup'},
            {f: '/Evez666/docs/gumroad-setup.md', n: 'Gumroad integration'},
            {f: '/Evez666/docs/swarm-setup.md', n: 'Multi-agent setup'},
            {f: '/Evez666/docs/SECURITY_BEST_PRACTICES.md', n: 'Security notes'},
            {f: '/Evez666/docs/swarm-quick-reference.md', n: 'Quick reference'},
            {f: '/Evez666/PERFORMANCE_IMPROVEMENTS.md', n: 'Performance tips'},
            {f: '/Evez666/PROFIT_CIRCUIT_MANIFEST.md', n: 'Revenue/money setup'},
            {f: '/Evez666/SECURITY.md', n: 'Security guide'},
            {f: '/Evez666/DEPLOYMENT.md', n: 'Deploy guide'},
            {f: '/Evez666/SOUL.md', n: 'EVEZ Soul'},
            {f: '/memory/2026-04-18.md', n: 'Session memories'},
            {f: '/config/mcporter.json', n: 'MCP servers config'},
        ];

        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                updateDisplay(data);
            } catch(e) { console.log('Loading...'); }
        }
        
        function updateDisplay(data) {
            document.getElementById('timestamp').textContent = new Date().toLocaleString();
            const running = Object.values(data.agents).filter(v => v === 'running').length;
            document.getElementById('agent-count').textContent = running + '/4';
            document.getElementById('quantum-count').textContent = data.quantum.runs;
            document.getElementById('cycle-count').textContent = data.cycles;
            document.getElementById('github-count').textContent = data.github.changes;
            
            let tableHtml = '';
            for (const [name, status] of Object.entries(data.agents)) {
                const cls = status === 'running' ? 'running' : 'stopped';
                tableHtml += `<tr><td>${name}</td><td class="${cls}">● ${status}</td><td>active</td></tr>`;
            }
            document.getElementById('agent-table').innerHTML = tableHtml;
            
            const qPct = Math.min(data.quantum.runs, 100);
            document.getElementById('quantum-bar').style.width = qPct + '%';
            document.getElementById('quantum-label').textContent = `${data.quantum.runs} circuits • ${data.quantum.last_state.split(']')[1].trim()}`;
            
            let cheatHtml = '';
            cheatcodes.forEach(c => {
                cheatHtml += `<div class="cheat"><strong>${c.f}</strong><br><span style="color:#8b949e">${c.n}</span></div>`;
            });
            document.getElementById('cheatcodes').innerHTML = cheatHtml;
        }
        
        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
